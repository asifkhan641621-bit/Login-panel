<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Practice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>JavaScript Basic Practice</h1>

    <h2>Variable Example</h2>
    <button class="btn" onclick="showVariables()">show Variable</button>

    <h2>Function Example</h2>
    <button class="btn" onclick="sayHello()">Run Function</button>

    <h2>User Input Example</h2>
    <input class="input-section" type="text" id="username" placeholder="Enter your name">
    <input class="input-section" type="text" id="stdID" placeholder="Enter Your Student ID">
    <input class="input-section" type="email" id="email" placeholder="Email Address">
    <button class="btn" onclick="showname()">Submit</button>

    <h2>Output</h2>
    <p class="output" id="output">Result will appear Here</p>

    <script src="script.js"></script>
</body>

</html>
