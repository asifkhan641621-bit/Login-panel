<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Proj-3</title>

</head>

<body>
    <h1>Flex Direction Column</h1>

    <div class="flexbox-container-1">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

    <h1>Flex Direction row</h1>

    <div class="flexbox-container-2">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

     <h1>Justify-Start</h1>

    <div class="flexbox-container-3">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

     <h1 class="end">Justify-end</h1>

    <div class="flexbox-container-4">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

     <h1 class="center">Justify-Center</h1>

    <div class="flexbox-container-5">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

    <h1>Space-between</h1>

    <div class="flexbox-container-6">
        <div class="box">Class</div>
        <div class="box">Teacher</div>
        <div class="box">Students</div>
    </div>

</body>

</html>
